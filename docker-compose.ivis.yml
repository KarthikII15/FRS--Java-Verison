services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: attendance-postgres
    environment:
      POSTGRES_DB: FRS
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d FRS"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - attendance-network

  backend:
    build: ./backend
    container_name: attendance-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 8080
      CLIENT_ORIGIN: http://localhost:5173
      DB_HOST: postgres
      DB_PORT: 5432
      DB_SSL: "false"
      AUTH_MODE: api
      KAFKA_ENABLED: "false"
      FACE_DB_PATH: /app/data/face_db.sqlite
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/app/data
      - backend-temp:/app/temp
    networks:
      - attendance-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: attendance-frontend
    environment:
      VITE_AUTH_MODE: api
      VITE_API_BASE_URL: http://localhost:8080/api
      VITE_KEYCLOAK_URL: http://localhost:9090
      VITE_KEYCLOAK_REALM: attendance
      VITE_KEYCLOAK_CLIENT_ID: attendance-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    networks:
      - attendance-network

networks:
  attendance-network:
    driver: bridge

volumes:
  postgres-data:
  backend-data:
  backend-temp:
