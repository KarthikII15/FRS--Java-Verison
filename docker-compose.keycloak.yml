# Docker Compose for Keycloak + Application Stack
# Usage: docker-compose -f docker-compose.keycloak.yml up -d

version: '3.8'

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: attendance-kafka
    environment:
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: "1"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CLUSTER_ID: "MkU3OEVBNTcwNjJENDM2Qk"
      CLUSTER_ID: "MkU3OEVBNTcwNjJENDM2Qk"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - attendance-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    container_name: attendance-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    ports:
      - "9090:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak-data:/opt/keycloak/data
    depends_on:
      - keycloak-db
    networks:
      - attendance-network

  keycloak-db:
    image: postgres:15-alpine
    container_name: attendance-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - attendance-network

  # Optional: Pre-configured backend with Keycloak mode
  backend:
    build: ./backend
    container_name: attendance-backend
    environment:
      PORT: 8080
      AUTH_MODE: keycloak
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: attendance-intelligence
      KEYCLOAK_ISSUER: http://localhost:9090/realms/attendance-intelligence
      KEYCLOAK_AUDIENCE: attendance-api
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/attendance-intelligence/protocol/openid-connect/certs
      KAFKA_BROKERS: kafka:9092
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: attendance_intelligence
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - keycloak
      - kafka
    networks:
      - attendance-network

  postgres:
    image: postgres:15-alpine
    container_name: attendance-postgres
    environment:
      POSTGRES_DB: attendance_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - attendance-network

volumes:
  keycloak-data:
  keycloak-db-data:
  postgres-data:

networks:
  attendance-network:
    driver: bridge
