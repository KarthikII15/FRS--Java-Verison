# Docker Compose for Keycloak + Application Stack
# Usage: docker-compose -f docker-compose.keycloak.yml up -d

version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    container_name: attendance-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    ports:
      - "9090:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak-data:/opt/keycloak/data
    depends_on:
      - keycloak-db
    networks:
      - attendance-network

  keycloak-db:
    image: postgres:15-alpine
    container_name: attendance-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - attendance-network

  # Optional: Pre-configured backend with Keycloak mode
  backend:
    build: ./backend
    container_name: attendance-backend
    environment:
      PORT: 8080
      AUTH_MODE: keycloak
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: attendance-intelligence
      KEYCLOAK_ISSUER: http://localhost:9090/realms/attendance-intelligence
      KEYCLOAK_AUDIENCE: attendance-api
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/attendance-intelligence/protocol/openid-connect/certs
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: attendance_intelligence
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - keycloak
    networks:
      - attendance-network

  postgres:
    image: postgres:15-alpine
    container_name: attendance-postgres
    environment:
      POSTGRES_DB: attendance_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - attendance-network

volumes:
  keycloak-data:
  keycloak-db-data:
  postgres-data:

networks:
  attendance-network:
    driver: bridge
